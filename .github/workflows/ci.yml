name: Docker CI Pipeline with Trivy Scan

on:
  push:
    branches: [ "main" ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code
    - name: Checkout source code
      uses: actions/checkout@v3

    # Step 2: Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 3: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .

    # Step 4: Scan image with Trivy
    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/myapp:latest
        format: table
        severity: CRITICAL,HIGH
        exit-code: 0   # do not fail pipeline (for learning)
        ignore-unfixed: true

    # Step 5: Push Docker image
    - name: Push Docker image to DockerHub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest

    # Step 6: Finish
    - name: Done
      run: echo "Docker image built, scanned, and pushed successfully 🚀"